<!DOCTYPE html>
<html lang="en" data-theme="space">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>Browse — Nova Browser</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/browser.css">
</head>
<body data-theme="space">
  <div class="browser-bar">
    <button type="button" class="icon-btn" id="btn-back" title="Back" aria-label="Back">←</button>
    <button type="button" class="icon-btn" id="btn-forward" title="Forward" aria-label="Forward">→</button>
    <input type="url" class="url-input" id="url-input" placeholder="Search or enter URL" autocomplete="off">
    <button type="button" class="icon-btn" id="btn-star" title="Add bookmark" aria-label="Bookmark">☆</button>
    <button type="button" class="icon-btn" id="btn-reload" title="Reload" aria-label="Reload">↻</button>
    <button type="button" class="icon-btn" id="btn-home" title="Home" aria-label="Home">⌂</button>
  </div>
  <div class="browser-content">
    <div class="browser-hint hidden" id="browser-hint">
      <h2>Nova Browser</h2>
      <p>Enter a URL above or open a shortcut from the home screen.</p>
    </div>
  </div>

  <script src="js/bridge.js"></script>
  <script src="js/favicon.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/bookmarks.js"></script>
  <script src="js/browser-app.js"></script>
</body>
</html>
