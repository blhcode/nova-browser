<!DOCTYPE html>
<html lang="en" data-theme="space">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>Nova Browser</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0a0a12;
      color: #e8e8f5;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
  </style>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body data-theme="space">
  <header class="app-header">
    <div class="app-title">Nova <span>Browser</span></div>
    <div class="header-actions">
      <button type="button" class="icon-btn" id="btn-settings" title="Settings" aria-label="Settings">⚙</button>
    </div>
  </header>

  <form class="omnibar" id="omnibar-form">
    <input
      type="search"
      class="omnibar-input"
      id="omnibar-input"
      placeholder="Search Google or enter address"
      autocomplete="off"
      enterkeyhint="go"
    >
    <button type="submit" class="omnibar-go" aria-label="Go">→</button>
  </form>

  <nav class="tabs" aria-label="Sections">
    <button type="button" class="tab active" data-view="home">Home</button>
    <button type="button" class="tab" data-view="bookmarks">Bookmarks</button>
    <button type="button" class="tab" data-view="settings">Settings</button>
  </nav>

  <section id="view-home" class="view active">
    <div class="section-label">Shortcuts</div>
    <div id="shortcuts-empty" class="empty-state hidden">
      <p>No shortcuts pinned yet.</p>
      <p>Tap + to add a website shortcut.</p>
    </div>
    <div id="shortcuts-row" class="shortcuts-row" aria-label="Pinned shortcuts"></div>
  </section>

  <section id="view-bookmarks" class="view">
    <div class="section-label">All bookmarks</div>
    <div id="bookmarks-list" class="bookmarks-list"></div>
  </section>

  <section id="view-settings" class="view">
    <div id="settings-panel" class="settings-panel"></div>
  </section>

  <button type="button" class="fab" id="fab-add" title="Add bookmark" aria-label="Add bookmark">+</button>

  <script src="js/settings.js"></script>
  <script src="js/bridge.js"></script>
  <script src="js/favicon.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/bookmarks.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
