app-id: io.github.blhcode.nova-browser
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: nova-browser
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-download
modules:
  - name: nova-browser
    buildsystem: simple
    build-commands:
      - install -Dm755 flatpak/nova-browser-launch /app/bin/nova-browser
      - install -d /app/lib/nova-browser
      - cp -a linux/nova_browser /app/lib/nova-browser/
      - install -d /app/share/nova-browser
      - cp -a shared/ui /app/share/nova-browser/
      - install -Dm644 flatpak/io.github.blhcode.nova-browser.desktop
        /app/share/applications/io.github.blhcode.nova-browser.desktop
      - install -Dm644 flatpak/io.github.blhcode.nova-browser.metainfo.xml
        /app/share/metainfo/io.github.blhcode.nova-browser.metainfo.xml
      - install -Dm644 assets/icon/nova.svg
        /app/share/icons/hicolor/scalable/apps/io.github.blhcode.nova-browser.svg
      - install -Dm644 flatpak/icons/64x64/io.github.blhcode.nova-browser.png
        /app/share/icons/hicolor/64x64/apps/io.github.blhcode.nova-browser.png
      - install -Dm644 flatpak/icons/128x128/io.github.blhcode.nova-browser.png
        /app/share/icons/hicolor/128x128/apps/io.github.blhcode.nova-browser.png
    sources:
      - type: git
        url: https://github.com/blhcode/nova-browser.git
        tag: v1.1.2
        commit: 1f3147c9306013a8707c8af8e2b23f81131475ec